name: Deploy to shinyapps.io
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENV_VERSION: 1.1.4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'

      - name: Install renv
        run: |
          install.packages('remotes', repos = 'https://cloud.r-project.org')
          remotes::install_version(package = 'renv', version = Sys.getenv('RENV_VERSION'))
        shell: Rscript {0}

      - name: Install rsconnect
        run: |
          renv::install("rsconnect@1.3.4")
        shell: Rscript {0}

      - name: Configure rsconnect
        run: |
          rsconnect::setAccountInfo(
            name = '${{ secrets.SHINYAPPS_ACCOUNT }}',
            token = '${{ secrets.SHINYAPPS_TOKEN }}',
            secret = '${{ secrets.SHINYAPPS_SECRET }}'
          )
        shell: Rscript {0}

      - name: Create .Renviron file
        run: |
          cat << EOF > .Renviron
          APP_BACKEND=${{ secrets.APP_BACKEND }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PWD=${{ secrets.DB_PWD }}
          UPLOAD_PWD=${{ secrets.UPLOAD_PWD }}
          HASH_KEY=${{ secrets.HASH_KEY }}
          EOF

      - name: Deploy to shinyapps.io
        run: |
          rsconnect::deployApp(
            appName = "cohhio-youth-data-dashboard",
            appTitle = "COHHIO Youth Data Dashboard",
            appFiles = c(
              # Add any additional files unique to your app here.
              "R/",
              "inst/",
              "data/",
              "NAMESPACE",
              "DESCRIPTION",
              "app.R",
              ".Renviron",
              ".Rbuildignore",
              "manifest.json"
            ),
            account = "ohiobalanceofstatecoc",
            appId =  "7831250",
            lint = FALSE,
            forceUpdate = TRUE
          )
        shell: Rscript {0}
